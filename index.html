<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#153293" />
  <title>Personal Manager</title>

  <!-- PWA (opcional): si no subes estos iconos, no pasa nada -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <link rel="stylesheet" href="styles.css?v=4" />
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <button id="btnBack" class="iconbtn" aria-label="Volver" title="Volver">‹</button>

      <div class="topbar_titles">
        <div id="topTitle" class="topbar_title">Personal Manager</div>
        <div id="topSubtitle" class="topbar_subtitle"></div>
      </div>

      <div class="topbar_actions">
        <button id="btnAdd" class="iconbtn" aria-label="Añadir" title="Añadir">＋</button>
        <button id="btnSettings" class="iconbtn" aria-label="Ajustes" title="Ajustes">⚙</button>
      </div>
    </header>

    <main id="main" class="main"></main>

    <div id="toast" class="toast hidden"></div>

    <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true">
      <div class="modal">
        <div class="modal_head">
          <div id="modalTitle" class="modal_title">Modal</div>
          <button id="modalClose" class="iconbtn" aria-label="Cerrar" title="Cerrar">×</button>
        </div>
        <div id="modalBody" class="modal_body"></div>
        <div id="modalFoot" class="modal_foot"></div>
      </div>
    </div>
  </div>

  <script src="app.js?v=4"></script>
</body>
</html>
