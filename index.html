<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Personal Manager</title>
  <meta name="theme-color" content="#f6f7fb" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <button class="iconbtn" id="btnBack" aria-label="Volver" title="Volver">
        <span class="icon">‹</span>
      </button>

      <div class="topbar__title" id="topTitle">Personal Manager</div>

      <div class="topbar__actions">
        <button class="iconbtn" id="btnAdd" aria-label="Añadir" title="Añadir">
          <span class="icon">＋</span>
        </button>
        <button class="iconbtn" id="btnSettings" aria-label="Ajustes" title="Ajustes">
          <span class="icon">⚙</span>
        </button>
      </div>
    </header>

    <main id="main" class="main"></main>

    <div id="overlay" class="overlay hidden">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal__head">
          <div class="modal__title" id="modalTitle"></div>
          <button class="iconbtn" id="modalClose" aria-label="Cerrar" title="Cerrar"><span class="icon">×</span></button>
        </div>
        <div class="modal__body" id="modalBody"></div>
        <div class="modal__foot" id="modalFoot"></div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
