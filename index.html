<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Personal Manager 2.0</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="brand">
        <div class="title">Personal Manager 2.0</div>
        <div class="sub">Test de GitHub Pages (sin historias raras)</div>
      </div>
      <div class="actions">
        <button id="btnPing" class="btn">PING</button>
        <button id="btnReset" class="btn ghost">RESET</button>
      </div>
    </header>

    <main class="card">
      <h1>✅ Si ves esto, el HTML y el CSS están bien</h1>
      <p>Ahora probamos JavaScript abajo. Si JS carga, saldrá el estado.</p>

      <div class="kpis">
        <div class="kpi">
          <div class="kpiLabel">Estado</div>
          <div id="status" class="kpiValue">Cargando JS…</div>
        </div>
        <div class="kpi">
          <div class="kpiLabel">Clicks</div>
          <div id="clicks" class="kpiValue">0</div>
        </div>
      </div>

      <div class="logWrap">
        <div class="logTitle">Log</div>
        <pre id="log" class="log"></pre>
      </div>
    </main>

    <footer class="foot">
      <span>Ruta:</span> <code id="path"></code>
      <span>—</span>
      <span>Versión:</span> <code>v1</code>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
